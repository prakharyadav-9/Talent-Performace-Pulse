# =============================================================================
#  Talent Performance Pulse – Base Configuration
# =============================================================================

spring:
  application:
    name: performance-pulse

  # ── DataSource / PostgreSQL ──────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/performance_pulse}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ── JPA / Hibernate ──────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: create
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 50
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 50
    show-sql: false

  # ── Caching ──────────────────────────────────────────────────────────────
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m

  # ── Pagination guard ─────────────────────────────────────────────────────
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false

  # ── H2 Console – disabled everywhere; dev profile re-enables explicitly ──
  h2:
    console:
      enabled: false

# ── Server ───────────────────────────────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    threads:
      max: 200
      min-spare: 10

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  server:
    port: 9090
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized
    caches:
      enabled: true

# ── OpenAPI / Swagger ────────────────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
    try-it-out-enabled: false
  api-docs:
    path: /v3/api-docs

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.hr.performancepulse: DEBUG
    org.springframework.web: INFO
    org.springframework.cache: DEBUG
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
# =============================================================================
#  DEV Profile
#  Activated by: SPRING_PROFILES_ACTIVE=dev
#  Intentionally permissive – never deploy with this profile.
# =============================================================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/performance_pulse_dev
    username: postgres
    password: postgres             # plain credentials are fine for local dev only

  jpa:
    hibernate:
      ddl-auto: create-drop        # recreates schema on every restart in dev
    show-sql: true

  h2:
    console:
      enabled: false                # http://localhost:8080/h2-console (dev only)

# Swagger try-it-out re-enabled for dev convenience
springdoc:
  swagger-ui:
    try-it-out-enabled: true

# Management port opened fully for dev debugging
management:
  server:
    port: 8080                     # same port as app in dev – easier to curl locally
  endpoints:
    web:
      exposure:
        include: health, info, metrics, caches, env, loggers

logging:
  level:
    root: INFO
    com.hr.performancepulse: DEBUG
    org.hibernate.SQL: WARN
    # Uncomment below only for query param debugging in dev – never in prod
    # org.hibernate.type.descriptor.sql.BasicBinder: TRACE

---
# =============================================================================
#  PROD Profile
#  Activated by: SPRING_PROFILES_ACTIVE=prod
#  All sensitive values injected via environment variables (Docker / K8s secrets).
# =============================================================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url:      ${DB_URL:?DB_URL environment variable is required in prod}
    username: ${DB_USER:?DB_USER environment variable is required in prod}
    password: ${DB_PASSWORD:?DB_PASSWORD environment variable is required in prod}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate           # schema must match entities; never auto-migrate in prod
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: false

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health            # only health on public port 8080 in prod
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.hr.performancepulse: INFO  # no DEBUG in prod – reduces log volume and noise
    org.hibernate.SQL: WARN        # only log SQL warnings/errors in prod