# =============================================================================
#  Talent Performance Pulse – Base Configuration (PostgreSQL)
#  LLD §12.1 – Key properties documented inline
# =============================================================================

spring:
  application:
    name: performance-pulse

  # ── DataSource / PostgreSQL ──────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/performance_pulse
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ── JPA / Hibernate ──────────────────────────────────────────────────────
  jpa:
    # ddl-auto: create – automatically creates tables if they don't exist
    # Change to 'validate' in production after initial setup
    hibernate:
      ddl-auto: create
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    # LLD §12.1 – prevents lazy loading being triggered in the controller layer
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # LLD §14.2 – batch fetching reduces child-collection query count
        default_batch_fetch_size: 50
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 50
    show-sql: false

  # ── Caching ──────────────────────────────────────────────────────────────
  cache:
    type: caffeine
    # Per-cache TTLs are overridden programmatically in CacheConfig (LLD §7)
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m

  # ── Pagination guard ────────────────────────────────────────────────────
  data:
    web:
      pageable:
        # LLD §12.1 – protects against oversized page requests
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false

  # ── H2 Console (disabled) ────────────────────────────────────────────────
  h2:
    console:
      enabled: false

# ── Server ───────────────────────────────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    # LLD §12.1 – aligned with HikariCP pool sizing
    threads:
      max: 200
      min-spare: 10

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        # health + info always; metrics useful for validating Caffeine cache stats
        include: health, info, metrics, caches
  endpoint:
    health:
      show-details: when-authorized
    caches:
      enabled: true

# ── OpenAPI / Swagger ────────────────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
    try-it-out-enabled: true
  api-docs:
    path: /v3/api-docs

# ── Pagination guard ─────────────────────────────────────────────────────────
spring.data.web.pageable:
  # LLD §12.1 – protects against oversized page requests
  max-page-size: 100
  default-page-size: 20

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.hr.performancepulse: DEBUG
    org.springframework.web: INFO
    org.springframework.cache: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
---
# =============================================================================
#  DEV Profile – PostgreSQL (local development)
#  Activated by: SPRING_PROFILES_ACTIVE=dev
# =============================================================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/performance_pulse_dev
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: create-drop   # recreates schema on every startup in dev
    show-sql: true

  h2:
    console:
      enabled: false

logging:
  level:
    root: INFO
    com.hr.performancepulse: DEBUG
    org.hibernate.SQL: DEBUG


  h2:
    console:
      enabled: true           # http://localhost:8080/h2-console

# logging:
#   level:
#     com.hr.performancepulse: DEBUG

---
# =============================================================================
#  PROD Profile – PostgreSQL
#  All sensitive values injected via environment variables (Docker / K8s secrets)
#  LLD §12.1 – HikariCP tuned for 500 concurrent managers
# =============================================================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/performancepulse}
    username: ${DB_USER:pulse_user}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20          # LLD §14.1 – tuned for 500 concurrent users
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate             # schema must match entities; never auto-migrate in prod
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    com.hr.performancepulse: INFO
