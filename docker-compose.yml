# =============================================================================
#  Talent Performance Pulse – Docker Compose (PostgreSQL + Spring Boot)
#
#  Usage:
#    docker compose up -d          # Start PostgreSQL and Spring Boot
#    docker compose down -v        # Stop and remove volumes
#  
#  Default: Uses PostgreSQL with automatic database and table creation
#  Spring Boot will create tables via ddl-auto: create if they don't exist
# =============================================================================

services:

  # ── PostgreSQL Database ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: performance-pulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       performance_pulse
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pulse-net

  # ── pgAdmin (PostgreSQL Management UI) ──────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: performance-pulse-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - pulse-net

  # ── Spring Boot Application ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: performance-pulse-app
    image: performance-pulse:latest
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/performance_pulse
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
      # JVM memory – tune per deployment
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -Djava.security.egd=file:/dev/./urandom
    deploy:
      resources:
        limits:
          memory: 512m          # bump to 1g when adding real data volumes
        reservations:
          memory: 256m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s         # give Spring Boot time to start before first check
    networks:
      - pulse-net

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  pulse-net:
    driver: bridge

